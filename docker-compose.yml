services:

  backend:
    build:
      context: ./backend
    container_name: urbanpulse-backend

    ports:
      - "8000:8000"

    env_file:
      - .env

    restart: unless-stopped


  frontend:
    build:
      context: ./frontend

    container_name: urbanpulse-frontend

    ports:
      - "3000:3000"

    env_file:
      - .env

    depends_on:
      - backend

    restart: unless-stopped